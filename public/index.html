<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>FOERTA — Telegram Center</title>
    <link rel="stylesheet" href="style.css?v=11.24">
    <style>
        /* --- GAYA RESPONSIF & MOBILE --- */
        .hamburger-btn { display: none; }
        @media (max-width: 768px) {
            body { display: block !important; overflow-x: hidden; }
            .hamburger-btn { display: block !important; background: var(--surface2); color: var(--cyan); padding: 15px; text-align: center; font-weight: bold; font-family: 'Syne', sans-serif; border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000; cursor: pointer; font-size: 16px; letter-spacing: 2px; }
            .sidebar { display: none !important; width: 100% !important; height: auto !important; position: static !important; border-right: none !important; padding: 15px !important; background: var(--bg) !important; }
            .sidebar.show { display: flex !important; flex-direction: column !important; gap: 8px !important; }
            .nav-item { display: block !important; text-align: center !important; padding: 14px 15px !important; margin: 0 !important; background: #1A1D24 !important; border-radius: 8px !important; border: 1px solid #2D323E !important; border-left: none !important; }
            .nav-item .nav-text { display: block !important; font-size: 13px !important; font-weight: bold !important; color: #FFFFFF !important; }
            .nav-item.active { background: var(--cyan) !important; border-color: var(--cyan) !important; }
            .nav-item.active .nav-text { color: #000000 !important; }
            .logo, .nav-sep { display: none !important; } 
            .main { width: 100% !important; margin-left: 0 !important; padding: 15px !important; }
            .header { flex-direction: column !important; gap: 10px !important; margin-top: 5px !important; }
        }

        /* --- STYLING KHUSUS TELEGRAM BOT UI --- */
        .bot-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-wrap: wrap; }
        .bot-tab { background: transparent; color: var(--text2); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .bot-tab:hover { background: rgba(0, 210, 255, 0.05); color: var(--text); }
        .bot-tab.active { background: rgba(0, 210, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); }

        .chat-wrapper { flex: 1; display: flex; flex-direction: column; background: #0b0c0f; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; min-height: 500px;}
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .chat-action-area { padding: 15px; background: var(--surface); border-top: 1px solid var(--border); }

        /* Chat Bubbles */
        .msg-bubble { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 13px; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; }
        .msg-in { background: #2b5278; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-out { background: #407b46; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Inline Keyboard */
        .tg-keyboard { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .tg-btn-row { display: flex; gap: 6px; justify-content: space-between; flex-wrap: wrap; }
        .tg-btn-inline { background: rgba(0, 0, 0, 0.3); color: #5eb5f7; border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; min-width: 30%; text-align: center; font-size: 11px; font-weight: bold; transition: 0.2s; font-family: 'JetBrains Mono', monospace; }
        .tg-btn-inline:hover { background: rgba(0, 210, 255, 0.2); border-color: var(--cyan); }

        /* Highlight Text */
        .copyable-num { background: rgba(0, 210, 255, 0.15); color: var(--cyan); padding: 2px 6px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; text-decoration: underline dashed; }
        .copyable-num:hover { background: var(--cyan); color: #000; }
        
        /* Toast Notification (Copy Success) */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10000; }
    </style>
</head>
<body>

<div class="hamburger-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">☰ MENU FOERTA</div>

<nav class="sidebar" id="sidebar">
  <div class="logo"><h2>FOERTA</h2><span style="color:var(--text2)">Telegram Center</span></div>
  <div class="nav-item active"><span class="nav-text">🤖 Panel Bot OTP</span></div>
</nav>

<div class="main">
  <div class="header">
    <div class="stat-pill cyan" style="border-color: var(--cyan);">
        <span class="status-dot active"></span>
        <span style="font-weight: bold; letter-spacing: 1px;">Sistem Terhubung</span>
    </div>
  </div>

  <div class="content">
    <div class="page active" id="page-botpanel">
        <div class="card fade-in" style="display:flex; flex-direction:column; height: 82vh;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Telegram Bot Controller</h3>
                <span style="font-size:11px; color:var(--text2);">Auto-Sync History & Klik Nomor Untuk Copy</span>
            </div>
            
            <div class="bot-tabs">
                <button class="bot-tab active" onclick="switchBot('@PBDxbot', this)">PBD Panel</button>
                <button class="bot-tab" onclick="switchBot('@BotOTP2', this)">Bot OTP 2</button>
                <button class="bot-tab" onclick="switchBot('@BotOTP3', this)">Bot OTP 3</button>
            </div>

            <div class="chat-wrapper">
                <div class="messages-area" id="tgMessagesArea">
                    <div style="text-align:center; color:var(--text2); margin-top:20px; font-size:12px;">Memuat riwayat chat...</div>
                </div>
                
                <div class="chat-action-area">
                    <button class="btn btn-cyan" style="width:100%; padding:14px; font-size:14px; font-weight:bold;" onclick="sendTelegramCommand('/start')">▶ MULAI BOT (/start)</button>
                </div>
            </div>
        </div>
    </div>
  </div>
</div>

<div id="toast">Nomor berhasil disalin!</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let activeTelegramBot = '@PBDxbot';

    function switchBot(botUsername, btnElement) {
        activeTelegramBot = botUsername;
        document.querySelectorAll('.bot-tab').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        
        document.getElementById('tgMessagesArea').innerHTML = '<div style="text-align:center; color:var(--text2); margin-top:20px; font-size:12px;">Memuat riwayat chat...</div>';
        socket.emit('fetch_tg_history', botUsername);
        
        if(window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('show'); }
    }

    function scrollTgBottom() {
        const area = document.getElementById('tgMessagesArea');
        area.scrollTop = area.scrollHeight;
    }

    function sendTelegramCommand(cmd) {
        const area = document.getElementById('tgMessagesArea');
        area.innerHTML += `<div class="msg-bubble msg-out">${cmd}</div>`;
        scrollTgBottom();
        socket.emit('send_tg_command', { target: activeTelegramBot, command: cmd });
    }

    function clickTgInline(msgId, dataBase64, btnElement) {
        btnElement.style.opacity = '0.5';
        btnElement.innerText = '⏳';
        socket.emit('click_tg_inline', { target: activeTelegramBot, messageId: msgId, data: dataBase64 });
    }

    function copyNumber(numStr) {
        // Membersihkan spasi / strip agar nomor bersih
        const cleanNum = numStr.replace(/[\s\-\(\)]/g, '');
        navigator.clipboard.writeText(cleanNum).then(() => {
            const toast = document.getElementById('toast');
            toast.innerText = `Nomor ${cleanNum} disalin!`;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        });
    }

    function formatTextWithCopy(text) {
        if (!text) return "";
        let safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        // Render Markdown Bawaan Telegram
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); 
        safeText = safeText.replace(/__(.*?)__/g, '<em>$1</em>'); 
        safeText = safeText.replace(/`(.*?)`/g, '<code style="background:rgba(0,0,0,0.5);padding:2px 4px;border-radius:4px;color:var(--cyan);">$1</code>'); 
        
        // Render Angka biasa yang terselip di teks (Opsional)
        let regex = /(\+?[\d\s\-\(\)]{8,18}\d)/g;
        return safeText.replace(regex, (match) => {
            const cleanNum = match.replace(/[\s\-\(\)]/g, ''); 
            if(cleanNum.length < 8) return match; 
            return `<span class="copyable-num" onclick="copyNumber('${cleanNum}')">${match}</span>`;
        });
    }

    socket.on('tg_history', (payload) => {
        if (payload.bot !== activeTelegramBot) return; 
        
        const area = document.getElementById('tgMessagesArea');
        area.innerHTML = '';
        
        if (payload.messages.length === 0) {
            area.innerHTML = '<div style="text-align:center; color:var(--text2); margin-top:20px; font-size:12px;">Belum ada riwayat chat. Tekan tombol Mulai di bawah.</div>';
            return;
        }

        payload.messages.forEach(msg => { renderTgMessage(msg); });
        scrollTgBottom();
    });

    socket.on('tg_message_update', (msg) => {
        if (msg.bot !== activeTelegramBot) return;
        renderTgMessage(msg, true);
        scrollTgBottom();
    });

    function renderTgMessage(msg, isUpdate = false) {
        const area = document.getElementById('tgMessagesArea');
        let bubbleId = `tg-msg-${msg.messageId}`;
        let existingBubble = document.getElementById(bubbleId);

        let htmlContent = `<div>${formatTextWithCopy(msg.text)}</div>`;
        
        if (msg.buttons && msg.buttons.length > 0) {
            htmlContent += `<div class="tg-keyboard">`;
            msg.buttons.forEach(row => {
                htmlContent += `<div class="tg-btn-row">`;
                row.forEach(btn => {
                    
                    if (btn.url) {
                        // Tombol Link
                        htmlContent += `<button class="tg-btn-inline" onclick="window.open('${btn.url}', '_blank')">${btn.text}</button>`;
                    
                    } else if (btn.data) {
                        // Tombol Inline (Callback / Menunggu Proses)
                        htmlContent += `<button class="tg-btn-inline" onclick="clickTgInline(${msg.messageId}, '${btn.data}', this)">${btn.text}</button>`;
                    
                    } else if (btn.copyText || btn.className === 'KeyboardButtonCopy') {
                        // TOMBOL NOMOR (COPY)
                        let txtCopy = btn.copyText || btn.text;
                        htmlContent += `<button class="tg-btn-inline" style="border-color:var(--green); color:var(--green);" onclick="copyNumber('${txtCopy}')">📋 ${btn.text}</button>`;
                    
                    } else {
                        // TOMBOL KEYBOARD BAWAAN (seperti "Get Number", dikirim sebagai Teks)
                        htmlContent += `<button class="tg-btn-inline" style="border-color:var(--amber); color:var(--amber);" onclick="sendTelegramCommand('${btn.text}')">${btn.text}</button>`;
                    }
                    
                });
                htmlContent += `</div>`;
            });
            htmlContent += `</div>`;
        }

        if (existingBubble) {
            existingBubble.innerHTML = htmlContent;
        } else {
            const div = document.createElement('div');
            div.id = bubbleId;
            div.className = `msg-bubble ${msg.isMe ? 'msg-out' : 'msg-in'}`;
            div.innerHTML = htmlContent;
            area.appendChild(div);
        }
    }

    setTimeout(() => { socket.emit('fetch_tg_history', activeTelegramBot); }, 1000);
</script>
</body>
</html>
